    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #ff2a5f;
            --secondary: #7b39dc;
            --bg: #09090b;
            --bg-surface: #18181b;
            --border: rgba(255,255,255,0.08);
            --text-muted: #71717a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .clock { font-size: 4rem; font-weight: 300; letter-spacing: -2px; margin: 8px 0; }
        .date-str { color: var(--text-muted); font-size: 1rem; }

        /* Search */
        .search-wrapper { width: 100%; max-width: 640px; margin-bottom: 40px; position: relative; }
        .search-wrapper input {
            width: 100%; padding: 16px 20px 16px 50px;
            border-radius: 14px; border: 1px solid var(--border);
            background: var(--bg-surface); color: white; font-size: 1.1rem; font-family: inherit;
            outline: none; transition: border-color 0.2s;
        }
        .search-wrapper input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 1.2rem; }
        .autocomplete { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 10px; margin-top: 4px; overflow: hidden; z-index: 10; display: none; }
        .autocomplete.active { display: block; }
        .autocomplete-item { padding: 12px 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
        .autocomplete-item:hover { background: rgba(255,255,255,0.05); }
        .autocomplete-item img { width: 20px; height: 20px; border-radius: 4px; }

        /* Featured Grid */
        .section-title { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 14px; width: 100%; max-width: 900px; }
        .sites-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; width: 100%; max-width: 900px; margin-bottom: 32px; }
        .site-tile {
            background: var(--bg-surface); border: 1px solid var(--border); border-radius: 14px;
            padding: 16px 12px; text-align: center; text-decoration: none; color: white;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .site-tile:hover { transform: translateY(-4px); border-color: var(--primary); box-shadow: 0 8px 24px rgba(255,42,95,0.15); }
        .site-tile img { width: 40px; height: 40px; border-radius: 8px; }
        .site-tile span { font-size: 0.8rem; font-weight: 600; color: #d4d4d8; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; width: 100%; }

        /* Footer */
        .footer-bar { margin-top: auto; padding-top: 24px; display: flex; gap: 16px; font-size: 0.8rem; color: var(--text-muted); }
        .footer-bar a { color: var(--text-muted); text-decoration: none; }
        .footer-bar a:hover { color: white; }
    </style>
</head>

    <script>
        const API = 'https://hentaivault.me';

        // Clock
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            document.getElementById('dateStr').textContent = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Search
        const searchBox = document.getElementById('searchBox');
        const acBox = document.getElementById('autocomplete');
        let debounce;

        searchBox.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const q = searchBox.value.trim();
                if (q) window.location.href = `${API}/?q=${encodeURIComponent(q)}`;
            }
        });

        searchBox.addEventListener('input', () => {
            clearTimeout(debounce);
            const q = searchBox.value.trim();
            if (q.length < 2) { acBox.classList.remove('active'); return; }
            debounce = setTimeout(async () => {
                const res = await fetch(`${API}/api/sites?q=${encodeURIComponent(q)}&limit=5`).catch(() => null);
                if (!res) return;
                const data = await res.json().catch(() => null);
                if (!data || !data.sites) return;
                acBox.innerHTML = '';
                data.sites.forEach(site => {
                    const sUrl = new URL(site.url);
                    const div = document.createElement('div');
                    div.className = 'autocomplete-item';
                    div.innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${sUrl.hostname}&sz=32" alt=""><span>${site.name}</span>`;
                    div.onclick = () => { window.location.href = `${API}/site?id=${site.id}`; };
                    acBox.appendChild(div);
                });
                acBox.classList.toggle('active', data.sites.length > 0);
            }, 250);
        });

        document.addEventListener('click', e => { if (e.target !== searchBox) acBox.classList.remove('active'); });

        // Top sites
        async function loadTopSites() {
            const res = await fetch(`${API}/api/sites?sort=rating&limit=12`).catch(() => null);
            if (!res) return;
            const data = await res.json().catch(() => null);
            if (!data || !data.sites) return;
            const grid = document.getElementById('sitesGrid');
            grid.innerHTML = '';
            data.sites.forEach(site => {
                const sUrl = new URL(site.url);
                const tile = document.createElement('a');
                tile.className = 'site-tile';
                tile.href = `${API}/site?id=${site.id}`;
                tile.target = '_blank';
                tile.innerHTML = `<img src="https://www.google.com/s2/favicons?domain=${sUrl.hostname}&sz=64" alt="${site.name}" onerror="this.style.display='none'"><span>${site.name}</span>`;
                grid.appendChild(tile);
            });
        }

        // Site of the week
        async function loadSpotlight() {
            const res = await fetch(`${API}/api/site-of-the-week`).catch(() => null);
            if (!res || !res.ok) return;
            const data = await res.json().catch(() => null);
            if (!data || !data.site) return;
            const site = data.site;
            const sUrl = new URL(site.url);
            document.getElementById('spotlightLabel').style.display = 'block';
            const grid = document.getElementById('spotlightGrid');
            grid.innerHTML = `
                <a class="site-tile" href="${API}/site?id=${site.id}" target="_blank" style="flex-direction:row; text-align:left; padding: 20px; gap:16px; max-width:640px; width:100%; border-color: rgba(255,42,95,0.3);">
                    <img src="https://www.google.com/s2/favicons?domain=${sUrl.hostname}&sz=64" alt="${site.name}" style="width:48px; height:48px; flex-shrink:0;">
                    <div style="min-width:0;">
                        <div style="font-weight:800; font-size:1rem; margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${site.name}</div>
                        <div style="font-size:0.8rem; color:#a1a1aa; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;">${site.description || ''}</div>
                    </div>
                </a>`;
        }

        loadTopSites();
        loadSpotlight();
    </script>
