<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="HentaiVault | Comparison">
    <meta property="og:image" content="https://hentaivault.me/assets/favicon.png">
    <meta name="twitter:card" content="summary_large_image">

    <script type="application/ld+json" id="compare-schema">{}</script>

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .compare-layout { max-width: 1200px; margin: 40px auto; padding: 0 24px; }
        .compare-header { text-align: center; margin-bottom: 40px; }
        .compare-header h1 { font-size: 2.5rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .compare-grid { display: grid; grid-template-columns: 1fr 60px 1fr; gap: 20px; align-items: stretch; }
        @media (max-width: 768px) { .compare-grid { grid-template-columns: 1fr; gap: 10px; } }
        .compare-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 30px; text-align: center; transition: transform 0.2s; display: flex; flex-direction: column; }
        .compare-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .compare-icon { width: 100px; height: 100px; border-radius: var(--radius-lg); margin: 0 auto 20px; object-fit: contain; background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 10px; }
        .compare-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
        .compare-category { font-size: 0.9rem; color: var(--primary); font-weight: 600; text-transform: uppercase; margin-bottom: 15px; }
        .compare-rating { font-size: 1.5rem; color: #f59e0b; margin-bottom: 20px; }
        .compare-desc { color: var(--text-muted); line-height: 1.6; margin-bottom: 20px; text-align: left; flex-grow: 1; }
        .compare-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 30px; }
        .compare-vs { display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; color: var(--text-muted); opacity: 0.3; }
        @media (max-width: 768px) { .compare-vs { font-size: 1.5rem; margin: 10px 0; } }
        .btn-visit-large { display: inline-block; padding: 16px 32px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%); color: white; border-radius: var(--radius-pill); font-weight: 800; text-decoration: none; width: 100%; box-sizing: border-box; text-align: center; transition: all 0.2s; margin-top: auto; }
        .btn-visit-large:hover { box-shadow: 0 4px 15px rgba(255, 42, 95, 0.4); transform: scale(1.02); }
    </style>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G40QDCGTTZ"></script>

</body>
