<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HentaiVault Embed</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: transparent;
            overflow: hidden;
        }
        .embed-container {
            display: flex;
            align-items: center;
            background: #18181b; /* Zinc 900 */
            border: 1px solid #3f3f46; /* Zinc 700 */
            border-radius: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
        }
        .embed-container:hover {
            border-color: #ff2a5f;
            box-shadow: 0 4px 12px rgba(255, 42, 95, 0.2);
        }
        .embed-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            margin-right: 16px;
            object-fit: contain;
            background: rgba(255,255,255,0.05);
            padding: 4px;
        }
        .embed-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .embed-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .embed-rating {
            font-size: 14px;
            color: #f59e0b; /* Amber 500 */
            display: flex;
            align-items: center;
        }
        .embed-brand {
            font-size: 10px;
            color: #a1a1aa; /* Zinc 400 */
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <a href="#" target="_blank" rel="noopener noreferrer" class="embed-container" id="embed-link">
        <img src="" alt="Icon" class="embed-icon" id="embed-icon">
        <div class="embed-content">
            <h3 class="embed-title" id="embed-title">Loading...</h3>
            <div class="embed-rating" id="embed-rating">★★★★★</div>
            <div class="embed-brand">Featured on HentaiVault</div>
        </div>
    </a>
</body>
</html>
