            background: transparent;
            overflow: hidden;
        }
        .embed-container {
            display: flex;
            align-items: center;
            background: #18181b; /* Zinc 900 */
            border: 1px solid #3f3f46; /* Zinc 700 */
            border-radius: 12px;
            padding: 12px 16px;
            text-decoration: none;
            color: white;
            transition: all 0.2s;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
        }
        .embed-container:hover {
            border-color: #ff2a5f;
            box-shadow: 0 4px 12px rgba(255, 42, 95, 0.2);
        }
        .embed-icon {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            margin-right: 16px;
            object-fit: contain;
            background: rgba(255,255,255,0.05);
            padding: 4px;
        }
        .embed-content {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .embed-title {
            font-size: 16px;
            font-weight: 700;
            margin: 0 0 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .embed-rating {
            font-size: 14px;
            color: #f59e0b; /* Amber 500 */
            display: flex;
            align-items: center;
        }
        .embed-brand {
            font-size: 10px;
            color: #a1a1aa; /* Zinc 400 */
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;

    </style>

    <a href="#" target="_blank" rel="noopener noreferrer" class="embed-container" id="embed-link">

    <script id="embedWidgetScript">
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const siteId = urlParams.get('id');
            if(siteId) {
                try {
                    const res = await fetch(`/api/site?id=${siteId}`);
                    if(res.ok) {
                        const data = await res.json();
                        document.getElementById('embed-title').textContent = data.name;
                        document.getElementById('embed-rating').innerHTML = '★'.repeat(Math.round(data.rating || 0)) + '☆'.repeat(5 - Math.round(data.rating || 0));
                        document.getElementById('embed-icon').src = data.icon || 'assets/favicon.png';
                        document.getElementById('embed-link').href = data.url;
                    }
                } catch(e) {}
            }
        });
    </script>
