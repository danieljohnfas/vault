<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review | HentaiVault</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .review-layout {
            max-width: 1000px;
            margin: 120px auto 60px;
            padding: 0 24px;
        }
        .review-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }
        .review-icon {
            width: 120px;
            height: 120px;
            border-radius: var(--radius-lg);
            background: var(--bg-surface);
            padding: 10px;
            object-fit: contain;
            border: 1px solid var(--border);
        }
        .review-meta h1 { font-size: 3rem; margin-bottom: 8px; }
        .review-badge {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: var(--radius-pill);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .review-content {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px;
            line-height: 1.8;
            color: #d4d4d8;
        }
        .review-content h2 { color: var(--text-main); margin: 30px 0 15px; }
        .pros-cons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin: 40px 0;
        }
        .pc-box {
            padding: 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }
        .pc-box h3 { margin-bottom: 16px; font-size: 1.1rem; }
        .pros { background: rgba(34, 197, 94, 0.05); border-color: rgba(34, 197, 94, 0.2); }
        .cons { background: rgba(255, 42, 95, 0.05); border-color: rgba(255, 42, 95, 0.2); }
        .pc-list { list-style: none; padding: 0; }
        .pc-list li { margin-bottom: 8px; display: flex; gap: 8px; }
        .pc-list li::before { content: '✓'; color: #22c55e; font-weight: bold; }
        .cons .pc-list li::before { content: '✕'; color: #ff2a5f; }
        
        .cta-box {
            text-align: center;
            margin-top: 40px;
            padding: 40px;
            background: var(--bg-surface-elevated);
            border-radius: var(--radius-xl);
        }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-container"><a href="/" class="logo"><span class="logo-icon">🔞</span> HentaiVault</a><a href="/" class="btn-outline">Back to Vault</a></div></nav>

    <main class="review-layout" id="reviewContainer">
        <div style="text-align:center; padding:100px;">Loading Review...</div>
    </main>

    <script src="js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const siteId = params.get('id');
            const site = sitesData.find(s => s.id === siteId);

            if (!site) {
                document.getElementById('reviewContainer').innerHTML = '<h1>Site not found</h1><a href="/">Return to Home</a>';
                return;
            }

            document.title = `${site.name} Review | HentaiVault`;
            
            const urlObj = new URL(site.url);
            const domain = urlObj.hostname;
            const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;

            // Localization lookup
            const t = TRANSLATIONS[currentLang] || TRANSLATIONS.en;
            const localName = site[`name_${currentLang}`] || site.name;
            const localDesc = site[`description_${currentLang}`] || site.description;
            const localCat  = (t.categories && t.categories[site.category]) ? t.categories[site.category] : site.category;
            const localReview = site[`longReview_${currentLang}`] || site.longReview;

            document.getElementById('reviewContainer').innerHTML = `
                <div class="review-header">
                    <img src="${faviconUrl}" alt="${localName}" class="review-icon">
                    <div class="review-meta">
                        <div class="review-badge">${localCat}</div>
                        <h1>${localName}</h1>
                        <div class="rating">Rating: ${'★'.repeat(Math.floor(site.rating))}☆</div>
                    </div>
                </div>

                <div class="review-content">
                    <h2>Expert Review</h2>
                    <p>${localReview || localDesc + ' ' + localName + ' has established itself as a premier destination for ' + localCat.toLowerCase() + ' enthusiasts. In our 2026 audit, we found the site to be highly responsive and maintained with high-quality content.'}</p>
                    
                    <div class="pros-cons">
                        <div class="pc-box pros">
                            <h3>Pros</h3>
                            <ul class="pc-list">
                                ${ (site.pros || ['High quality content', 'Regular updates', 'Fast loading speeds']).map(p => `<li>${p}</li>`).join('') }
                            </ul>
                        </div>
                        <div class="pc-box cons">
                            <h3>Cons</h3>
                            <ul class="pc-list">
                                ${ (site.cons || ['Some intrusive ads', 'Requires high-speed connection']).map(c => `<li>${c}</li>`).join('') }
                            </ul>
                        </div>
                    </div>

                    <h2>Conclusion</h2>
                    <p>If you are looking for a reliable source for ${localCat}, ${localName} is a top-tier choice. It ranks highly in our directory for its ease of use and content variety.</p>

                    <div class="cta-box">
                        <h3>Ready to explore?</h3>
                        <p style="margin-bottom:20px;">Visit the official site below.</p>
                        <a href="${site.url}" target="_blank" class="btn-visit" style="font-size:1.2rem; padding:15px 40px; text-decoration: none;">Visit ${localName} &rarr;</a>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
