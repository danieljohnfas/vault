name: 🔄 Sync GitHub to D1

on:
  push:
    branches:
      - main
    paths:
      - 'js/data.js'
  schedule:
    # Run daily as a fallback to ensure absolute sync
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync data.js to Cloudflare D1
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if data.js exists
        id: check_file
        run: |
          if [ -f "js/data.js" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ js/data.js not found. D1 is the source of truth. Skipping sync."
          fi

      - name: Set up Node.js
        if: steps.check_file.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate SQL Scripts
        if: steps.check_file.outputs.exists == 'true'
        run: node scripts/generate-sql.js

      - name: Install Wrangler
        if: steps.check_file.outputs.exists == 'true'
        run: npm install -g wrangler

      - name: Execute SQL on Cloudflare D1
        if: steps.check_file.outputs.exists == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Loop through all generated insert files and execute them
          for f in insert_*.sql; do
            echo "Executing $f..."
            npx wrangler d1 execute hv-directory --remote --file="$f"
          done
          echo "✅ Successfully synced data.js to D1!"
