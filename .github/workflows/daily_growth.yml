name: Daily Growth Scout

on:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: Run HV Scout
      run: python scripts/scout.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name 'HV-Scout-Bot'
        git config --global user.email 'scout-bot@hentaivault.me'
        git add js/data.js
        git commit -m "chore: automated daily growth - added 100 new sites [skip ci]" || echo "No changes to commit"
        git push
