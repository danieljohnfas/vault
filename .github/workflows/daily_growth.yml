name: Master Automation Suite

on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC
  workflow_dispatch:

jobs:
  automate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r scripts/requirements.txt

    - name: 1. Scout & Translate
      run: python scripts/scout.py

    - name: 2. Health Check
      run: python scripts/health_check.py

    - name: 3. SEO & Sitemap Generation
      run: python scripts/seo_gen.py

    - name: Commit Changes
      run: |
        git config --global user.name 'HV-Master-Bot'
        git config --global user.email 'bot@hentaivault.me'
        git add js/data.js sitemap.xml
        git commit -m "chore: master automation update [skip ci]" || echo "No changes"
        git push

    - name: 4. Telegram Broadcast
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      run: python scripts/broadcast.py
