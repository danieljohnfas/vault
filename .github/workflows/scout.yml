name: 🕵️ Scout V2

on:
  schedule:
    # Runs every Sunday at Midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  scout:
    name: Advanced Social & AI Scout
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Configure Git
        run: |
          git config user.name "HentaiVault Scout Bot"
          git config user.email "bot@hentaivault.me"

      - name: Run Scout V2
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          node scripts/scout-v2.js

      - name: Commit updated queue to GitHub
        run: |
          git add scripts/sites-queue.json
          git diff --cached --quiet && echo "No new sites found." || \
            git commit -m "feat(scout): append crazy new discoveries to queue [$(date -u +%Y-%m-%d)]"
          git push
