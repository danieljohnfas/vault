    <script>
        const escapeHTML = (str) => {
            if (!str) return '';
            return String(str).replace(/[&<>'"]/g, tag => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[tag] || tag));
        };
document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const siteId = params.get('id');
            if (!siteId) {
                document.getElementById('reviewContent').innerHTML = '<h1>Site not found</h1><a href="/">Return to Home</a>';
                return;
            }
            let site;
            try {
                const res = await fetch(`/api/site?id=${siteId}`);
                if (!res.ok) throw new Error('Not found');
                site = await res.json();
            } catch (err) {
                document.getElementById('reviewContent').innerHTML = '<h1>Site not found</h1><a href="/">Return to Home</a>';
                return;
            }
            const urlObj = new URL(site.url);
            const domain = urlObj.hostname;
            const faviconUrl = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
            // Localization lookup
            const t = TRANSLATIONS[currentLang] || TRANSLATIONS.en;
            const localName = escapeHTML(site[`name_${currentLang}`] || site.name);
            const localDesc = escapeHTML(site[`description_${currentLang}`] || site.description);
            const localCat  = escapeHTML((t.categories && t.categories[site.category]) ? t.categories[site.category] : site.category);
            const localReview = escapeHTML(site[`longReview_${currentLang}`] || site.longReview);
            // Dynamic localized headers and SEO meta tags
            let titleText = `12 Best Alternatives to ${localName} in 2026 | HentaiVault`;
            let descText = `Looking for sites like ${localName}? Here are the top rated ${localCat} alternatives for 2026 with high quality and active communities.`;
            
            if (currentLang === 'fr') {
                titleText = `12 Meilleures Alternatives à ${localName} en 2026 | HentaiVault`;
                descText = `Vous cherchez des sites comme ${localName} ? Voici les meilleures alternatives ${localCat} en 2026.`;
            } else if (currentLang === 'es') {
                titleText = `Las 12 Mejores Alternativas a ${localName} en 2026 | HentaiVault`;
                descText = `¿Buscas sitios como ${localName}? Aquí están las mejores alternativas de ${localCat} para 2026.`;
            } else if (currentLang === 'jp') {
                titleText = `${localName}の代替サイトトップ12 (2026年) | HentaiVault`;
                descText = `${localName}に似たサイトをお探しですか？2026年の最高の${localCat}代替サイトはこちらです。`;
            }
            document.title = titleText;
            document.getElementById('pageTitle').textContent = `12 Best Alternatives to ${localName}`;
            document.getElementById('pageDesc').textContent = `Looking for sites like ${localName}? We analyzed our directory to bring you the top rated ${localCat} sites.`;
            
            // Function helpers to set metadata
            const setMeta = (name, val) => {
                let el = document.querySelector(`meta[name="${name}"]`);
                if (!el) { el = document.createElement('meta'); el.name = name; document.head.appendChild(el); }
                el.content = val;
            };
            const setMetaProp = (prop, val) => {
                let el = document.querySelector(`meta[property="${prop}"]`);
                if (!el) { el = document.createElement('meta'); el.setAttribute('property', prop); document.head.appendChild(el); }
                el.content = val;
            };
            setMeta('description', descText);
            setMeta('keywords', `${localName} alternatives, sites like ${localName}, similar to ${localName}, ${localCat} sites`);
            setMetaProp('og:title', titleText);
            setMetaProp('og:description', descText);
            setMetaProp('og:url', window.location.href);
            setMeta('twitter:title', titleText);
            setMeta('twitter:description', descText);

            // Fetch Alternatives
            let alternatives = [];
            try {
                const altRes = await fetch(`/api/alternatives?id=${siteId}`);
                const altData = await altRes.json();
                if (altData && altData.sites) {
                    alternatives = altData.sites;
                }
            } catch (e) {
                console.error("Failed to load alternatives");
            }

            const altGrid = document.getElementById('alternativesGrid');
            altGrid.innerHTML = ''; // clear loading
            
            alternatives.forEach(s => {
                const sUrl = new URL(s.url);
                const sFavicon = `https://www.google.com/s2/favicons?domain=${sUrl.hostname}&sz=128`;
                const sLocalName = escapeHTML(s[`name_${currentLang}`] || s.name);
                const sLocalCat = (t.categories && t.categories[s.category]) ? t.categories[s.category] : s.category;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = \`
                    <div class="card-banner">
                        <img src="https://image.thum.io/get/width/400/crop/220/noanimate/\${s.url}" alt="\${sLocalName} screenshot" loading="lazy" onerror="this.parentElement.classList.add('card-banner--fallback'); this.remove();">
                    </div>
                    <div class="card-header">
                        <div style="position:relative; display:inline-block; line-height: 0;">
                            <img src="\${sFavicon}" alt="" class="card-icon" loading="lazy">
                        </div>
                        <div>
                            <div class="card-title"><a href="/site?id=\${s.id}" style="text-decoration:none; color:inherit;">\${sLocalName}</a></div>
                            <div class="card-category">\${sLocalCat}</div>
                        </div>
                    </div>
                    <div class="card-desc" style="font-size:0.9rem; -webkit-line-clamp: 3;">\${escapeHTML(s[\`description_\${currentLang}\`] || s.description)}</div>
                    <div class="card-footer" style="margin-top:auto;">
                        <div class="rating">Rating: \${'★'.repeat(Math.floor(s.rating))}☆</div>
                        <div class="card-actions">
                            <a href="\${s.url}" target="_blank" rel="nofollow noopener noreferrer" class="btn-visit" style="padding: 6px 16px;">Visit &rarr;</a>
                        </div>
                    </div>
                \`;
                altGrid.appendChild(card);
            });
            // === Inject WebPage + AggregateRating Schema (fixes GSC schema errors) ===
            const schemaEl = document.getElementById('review-schema');
            if (schemaEl && site) {
                const pageSchema = {
                    "@context": "https://schema.org",
                    "@type": "WebPage",
                    "name": site.name + " Review | HentaiVault",
                    "url": `https://hentaivault.me/site?id=${site.id}`,
                    "description": `Expert review of ${site.name} — ratings, pros, cons, and alternatives.`,
                    "about": {
                        "@type": "WebSite",
                        "name": site.name,
                        "url": site.url
                    },
                    "aggregateRating": {
                        "@type": "AggregateRating",
                        "ratingValue": String(site.rating),
                        "bestRating": "5",
                        "worstRating": "1",
                        "ratingCount": "1"
                    },
                    "author": {
                        "@type": "Organization",
                        "name": "HentaiVault",
                        "url": "https://hentaivault.me"
                    }
                };
                schemaEl.textContent = JSON.stringify(pageSchema);
            }
        });
    </script>
